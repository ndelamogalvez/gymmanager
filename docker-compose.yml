services:
  mysql:
    image: mysql:8.4
    container_name: gym_bdd
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gym_bdd
      MYSQL_USER: gymAdmin
      MYSQL_PASSWORD: p4ssw0rd!
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: gym_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: p4ssw0rd!
    depends_on:
      - mysql

volumes:
  mysql_data:
